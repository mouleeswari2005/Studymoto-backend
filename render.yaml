services:
  # Backend service
  - type: web
    name: study-moto-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: study-moto-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '*' # Update this to your frontend URL after deployment for security

  # Frontend service
  - type: static
    name: study-moto-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: study-moto-backend
          property: host

databases:
  - name: study-moto-db
    databaseName: student_productivity
    user: postgres
    plan: free # Change to a different plan if needed
